<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}">
    <title>Lista de Ferramentas</title>
</head>
<body>
<main>
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div th:replace="~{fragments/layout :: base(~{:: #conteudo})}">
        <div id="conteudo">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1>Ferramentas Cadastradas</h1>
                <button class="btn btn-danger" type="button" data-bs-toggle="collapse" data-bs-target="#formCollapse">
                    + Nova Ferramenta
                </button>
            </div>

            <div class="collapse mb-4" id="formCollapse">
                <div class="card card-body shadow-sm">
                    <form th:action="@{/ferramentas/cadastrar}" th:object="${ferramenta}" method="post">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nome da Ferramenta</label>
                                <input type="text" class="form-control" th:field="*{nome}" placeholder="Ex: Furadeira">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Horas de Uso</label>
                                <input type="number" class="form-control" th:field="*{horas_uso}" placeholder="0">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Vida Útil Máxima (h)</label>
                                <input type="number" class="form-control" th:field="*{vidaUtilMaxima}" placeholder="1000">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-danger mt-3">Cadastrar</button>
                    </form>
                </div>
            </div>

            <div class="collapse mb-4" th:classappend="${modoAtualizar} ? 'show' : ''" id="formCollapseUpt">
                <div class="card card-body shadow-sm">
                    <form th:action="@{/ferramentas/atualizar}" th:object="${ferramentaAtualizar}" method="post">
                        <input type="hidden" name="_method" value="put"/>

                        <input type="hidden" th:field="*{id}"/>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nome da Ferramenta</label>
                                <input type="text" class="form-control" th:field="*{nome}" placeholder="Ex: Furadeira">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Horas de Uso</label>
                                <input type="number" class="form-control" th:field="*{horas_uso}" placeholder="0">
                            </div>

                            <div class="col-md-3">
                                <label class="form-label">Vida Útil Máxima (h)</label>
                                <input type="number" class="form-control" th:field="*{vidaUtilMaxima}" placeholder="1000">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-danger mt-3">
                            Atualizar
                        </button>
                    </form>

                </div>
            </div>

            <div class="row">
                <th:block th:each="f : ${ferramentas}">
                    <div th:replace="~{fragments/componentes::card-ferramenta(f=${f})}"></div>
                </th:block>
            </div>

            <div class="text-center text-muted py-5" th:if="${#lists.isEmpty(ferramentas)}">
                <p class="fs-5">Nenhuma ferramenta cadastrada.</p>
            </div>
        </div>
    </div>
</main>
</body>
</html>
