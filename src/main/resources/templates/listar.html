<html xmlns:th="https://www.thymeleaf.org">
    <head>
        <title>Lista Ferramentas</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">
    
    </head>
    <body class="bg-light min-vh-100 d-flex flex-column">
         <div class="container mt-5"> 
            <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Lista de Ferramentas</h3>
            </div>
                
                <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Horas de Uso</th>
                            <th>Vida Util Maxima</th>
                        </tr>
                    </thead>
                    
                    <tbody
                        <tr th:each="ferramenta : ${ferramentas}">
                            <td th:text="${ferramenta.id}"></td>
                            <td th:text="${ferramenta.nome}"></td>
                            <td th:text="${ferramenta.horas_uso}"></td>
                            <td th:text="${ferramenta.vidaUtilMaxima}">-</td>
                        </tr>
                     </tbody>
                </table>
            </div>
        </div>
    </div>
 </body>
</html>
